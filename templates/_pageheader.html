<div class="page-header">
    <div class="page-header-title">AFUSA &mdash; Sistema de Gestión</div>
    <div class="page-header-date" id="headerDate"></div>
</div>
<script>
(function(){
    const d = new Date();
    const dias = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
    const meses = ['enero','febrero','marzo','abril','mayo','junio',
                   'julio','agosto','septiembre','octubre','noviembre','diciembre'];
    const txt = dias[d.getDay()] + ', ' + d.getDate() + ' de ' + meses[d.getMonth()] + ' de ' + d.getFullYear();
    document.getElementById('headerDate').textContent = txt.charAt(0).toUpperCase() + txt.slice(1);
})();
</script>
